<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Plan Maker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3799;
            --bg: #f1f2f6;
        }
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
        }
        .no-print {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            max-width: 800px;
            margin: 0 auto 30px auto;
        }
        h2 { text-align: center; color: var(--primary); margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced6e0;
            border-radius: 5px;
            font-family: 'Roboto', sans-serif;
            box-sizing: border-box;
            font-size: 15px;
        }
        textarea { height: 180px; resize: vertical; }
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-family: 'Roboto', sans-serif;
            font-weight: bold;
            transition: 0.3s;
            color: white;
        }
        .convert-btn { background-color: #e58e26; }
        .convert-btn:hover { background-color: #fa983a; }
        .print-btn { background-color: #009432; }
        .print-btn:hover { background-color: #006266; }

        /* Preview and Print Styles */
        #printable-area { 
            display: none; 
            background: white; 
            padding: 20px; 
            border-radius: 5px; 
            max-width: 210mm;
            margin: 0 auto;
        }

        @media print {
            body { margin: 0; padding: 0; background-color: white; }
            .no-print { display: none; }
            #printable-area { display: block; padding: 0; max-width: none; }
            
            @page { size: A4; margin: 0; }

            .page {
                width: 210mm;
                height: 297mm;
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: repeat(5, 1fr);
                page-break-after: always;
                box-sizing: border-box;
                padding: 10mm; 
                gap: 2mm;
            }

            .ticket {
                border: 1px dashed #555;
                border-radius: 4px;
                padding: 10px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
                box-sizing: border-box;
                overflow: hidden;
            }

            .dynamic-container {
                width: 100%;
                white-space: nowrap;
                overflow: hidden;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .t-school { font-weight: bold; margin-bottom: 4px; color: navy; }
            .t-exam { font-weight: bold; margin-bottom: 6px; border-bottom: 1px solid #000; padding-bottom: 2px; color: green; }
            .t-class { margin-bottom: 10px; }
            .t-student { font-weight: bold; margin-bottom: 8px; color: #000; }
            
            .roll-box {
                border: 1px solid #000;
                padding: 3px 15px;
                border-radius: 5px;
                font-weight: bold;
                background-color: #f8f8f8;
                display: inline-block;
            }
        }
    </style>
</head>
<body>

    <div class="no-print">
        <h2>Seat Plan Generator</h2>
        <div class="form-group">
            <label>Institution Name:</label>
            <input type="text" id="schoolName" value="Green Sign Residential School & College">
        </div>
        <div class="form-group">
            <label>Examination Name:</label>
            <input type="text" id="examName" value="First Term Examination 2026">
        </div>
        <div class="form-group">
            <label>Class & Section:</label>
            <input type="text" id="className" value="Nursery">
        </div>
        <div class="form-group">
            <label>Student Data (Copy from Excel and paste here):</label>
            <textarea id="studentData" placeholder="01  Roll No Student Name..."></textarea>
        </div>
        
        <div class="controls">
            <button class="convert-btn" onclick="convertBijoyToAvro()">Bijoy -> Avro Convert</button>
            <button class="print-btn" onclick="generateAndPrint()">Generate & Print Seat Plan</button>
        </div>
    </div>

    <div id="printable-area"></div>

        function adjustFontSize() {
            const elements = document.querySelectorAll('.dynamic-text');
            elements.forEach(el => {
                const container = el.parentElement;
                let fontSize = parseFloat(el.getAttribute('data-max-size')); 
                el.style.fontSize = fontSize + 'px';
                
                while (el.scrollWidth > container.clientWidth && fontSize > 8) {
                    fontSize -= 0.5;
                    el.style.fontSize = fontSize + 'px';
                }
            });
        }

        function generateAndPrint() {
            const schoolName = document.getElementById('schoolName').value;
            const examName = document.getElementById('examName').value;
            const className = document.getElementById('className').value;
            const rawData = document.getElementById('studentData').value;

            if (!rawData.trim()) {
                alert("Please provide student data!");
                return;
            }

            const lines = rawData.split('\n');
            let students = [];

            lines.forEach(line => {
                if (line.trim() !== '') {
                    let parts = line.split('\t'); 
                    if(parts.length < 2) { parts = line.split(/\s{2,}/); }
                    if(parts.length < 2) { parts = line.split(/\s+(.+)/); }
                    
                    if (parts.length >= 2) {
                        let roll = parts[0].trim();
                        let name = parts[1].trim();
                        
                        name = name.replace(/[\r\n]+/g, " ").trim();
                        roll = roll.replace(/[\r\n]+/g, "").trim();

                        if(!name.includes("Student Name") && !roll.includes("Roll")) {
                            students.push({ roll: roll, name: name });
                        }
                    }
                }
            });

            const printArea = document.getElementById('printable-area');
            printArea.innerHTML = '';
            printArea.style.display = 'block';

            const tokensPerPage = 15; 
            let totalPages = Math.ceil(students.length / tokensPerPage);

            for (let i = 0; i < totalPages; i++) {
                let pageDiv = document.createElement('div');
                pageDiv.className = 'page';

                for (let j = 0; j < tokensPerPage; j++) {
                    let studentIndex = (i * tokensPerPage) + j;
                    if (studentIndex < students.length) {
                        let student = students[studentIndex];
                        let ticketHtml = `
                            <div class="ticket">
                                <div class="dynamic-container t-school">
                                    <span class="dynamic-text" data-max-size="12">${schoolName}</span>
                                </div>
                                <div class="dynamic-container t-exam">
                                    <span class="dynamic-text" data-max-size="14">${examName}</span>
                                </div>
                                <div class="dynamic-container t-class">
                                    <span class="dynamic-text" data-max-size="13">${className}</span>
                                </div>
                                <div class="dynamic-container t-student">
                                    <span class="dynamic-text" data-max-size="17">${student.name}</span>
                                </div>
                                <div class="dynamic-container">
                                    <span class="dynamic-text roll-box" data-max-size="16">Roll: ${student.roll}</span>
                                </div>
                            </div>
                        `;
                        pageDiv.innerHTML += ticketHtml;
                    } else {
                        pageDiv.innerHTML += `<div class="ticket" style="border-color: transparent;"></div>`;
                    }
                }
                printArea.appendChild(pageDiv);
            }

            setTimeout(() => {
                adjustFontSize();
                window.print();
                printArea.style.display = 'none';
            }, 300);
        }
    </script>
</body>
</html>
