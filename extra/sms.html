<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS API Gateway</title>
    <style>
        /* Modern Mobile-Friendly CSS */
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --error-bg: #fee2e2;
            --error-text: #991b1b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { background-color: var(--bg); color: var(--text-main); padding: 1rem; display: flex; justify-content: center; }
        
        .app-container { width: 100%; max-width: 500px; background: var(--card-bg); border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        
        header { background: var(--primary); color: white; padding: 1.25rem; text-align: center; }
        header h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
        
        .api-key-box { padding: 0; }
        .api-key-input { width: 100%; padding: 0.8rem 1.25rem; border: none; border-bottom: 1px solid var(--primary); outline: none; text-align: center; font-family: monospace; font-size: 1rem; background: #eff6ff; }
        .api-key-input:focus { background: #dbeafe; }

        .tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 1rem 0; background: none; border: none; border-bottom: 2px solid transparent; font-size: 0.95rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: 0.3s; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        
        .view { display: none; padding: 1.5rem; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.4rem; }
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; outline: none; transition: 0.2s; font-size: 0.95rem; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        textarea.form-control { resize: vertical; min-height: 80px; }
        
        .row { display: flex; gap: 1rem; }
        .col { flex: 1; }

        .btn-submit { width: 100%; padding: 0.9rem; border: none; border-radius: 8px; background: var(--primary); color: white; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 0.5rem; }
        .btn-submit:hover { background: var(--primary-dark); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }

        .alert { margin-top: 1.2rem; padding: 1rem; border-radius: 8px; font-size: 0.85rem; display: none; word-break: break-all; white-space: pre-wrap; font-family: monospace; }
        .alert.success { display: block; background: var(--success-bg); color: var(--success-text); border: 1px solid #bbf7d0; }
        .alert.error { display: block; background: var(--error-bg); color: var(--error-text); border: 1px solid #fecaca; }
        .alert.info { display: block; background: #eff6ff; color: #1e3a8a; border: 1px solid #bfdbfe; }
        
        .help-text { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.3rem; display: block; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>SMS Dashboard</h1>
    </header>

    <div class="api-key-box">
        <input type="password" id="apiKey" class="api-key-input" placeholder="Paste your API_KEY here...">
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('send')">Send SMS</button>
        <button class="tab-btn" onclick="openTab('balance')">Balance</button>
        <button class="tab-btn" onclick="openTab('report')">Report</button>
    </div>

    <div id="view-send" class="view active">
        <form id="formSend" onsubmit="handleBulkSend(event)">
            <div class="form-group">
                <label>To (Recipients) *</label>
                <textarea id="toNumbers" class="form-control" placeholder="8801800000000, 8801700000000" required></textarea>
                <span class="help-text">Start with 880. Separate multiple with comma. The app will send to them one by one automatically.</span>
            </div>
            
            <div class="form-group">
                <label>Message Content *</label>
                <textarea id="msgBody" class="form-control" placeholder="Type your message here..." required></textarea>
            </div>
            
            <div class="row">
                <div class="col form-group">
                    <label>Sender ID</label>
                    <input type="text" id="senderId" class="form-control" placeholder="Optional">
                </div>
                <div class="col form-group">
                    <label>Content ID</label>
                    <input type="text" id="contentId" class="form-control" placeholder="Bulk Optional">
                </div>
            </div>

            <div class="form-group">
                <label>Schedule (Optional)</label>
                <input type="datetime-local" id="schedule" class="form-control">
            </div>

            <button type="submit" class="btn-submit" id="btnSend">Send Message</button>
            <div id="resSend" class="alert"></div>
        </form>
    </div>

    <div id="view-balance" class="view">
        <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 1.5rem; text-align: center;">Click below to check your current account balance.</p>
        <button class="btn-submit" id="btnBalance" onclick="handleBalance()">Check Balance</button>
        <div id="resBalance" class="alert"></div>
    </div>

    <div id="view-report" class="view">
        <div class="form-group">
            <label>Request ID *</label>
            <input type="text" id="reqId" class="form-control" placeholder="e.g. 12345">
        </div>
        <button class="btn-submit" id="btnReport" onclick="handleReport()">Check Status</button>
        <div id="resReport" class="alert"></div>
    </div>
</div>

<script>
    // Tab Navigation Logic
    function openTab(tabName) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`view-${tabName}`).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // Utility: Get Key
    function getApiKey() {
        const key = document.getElementById('apiKey').value.trim();
        if(!key) { alert("Please paste your API Key at the top first!"); return null; }
        return key;
    }

    // Utility: Show Alert
    function showAlert(elementId, type, message) {
        const el = document.getElementById(elementId);
        el.className = `alert ${type}`;
        el.textContent = typeof message === 'object' ? JSON.stringify(message, null, 2) : message;
    }

    // Utility: Format Date
    function formatSchedule(datetimeLocal) {
        if(!datetimeLocal) return "";
        return datetimeLocal.replace('T', ' ') + ':00';
    }

    // Error Catcher
    function getErrorMessage(error) {
        if(error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
            return "CORS/Network Error: API blocked browser request.";
        }
        return `Error: ${error.message}`;
    }

    // 1. Handle Bulk Send (One by One)
    async function handleBulkSend(e) {
        e.preventDefault();
        const key = getApiKey(); if(!key) return;
        
        // Process numbers: split by comma, remove spaces, filter out empties
        const rawNumbers = document.getElementById('toNumbers').value;
        const numberArray = rawNumbers.split(',').map(num => num.replace(/\s+/g, '')).filter(num => num.length > 0);

        if (numberArray.length === 0) {
            return alert("Please enter at least one valid number.");
        }

        const btn = document.getElementById('btnSend');
        btn.disabled = true; 
        
        // Prepare base form data
        const baseFormData = new FormData();
        baseFormData.append('api_key', key);
        baseFormData.append('msg', document.getElementById('msgBody').value);
        
        const senderId = document.getElementById('senderId').value;
        if(senderId) baseFormData.append('sender_id', senderId);
        
        const contentId = document.getElementById('contentId').value;
        if(contentId) baseFormData.append('content_id', contentId);
        
        const schedule = document.getElementById('schedule').value;
        if(schedule) baseFormData.append('schedule', formatSchedule(schedule));

        let successCount = 0;
        let failCount = 0;
        let lastError = "";

        // The One-by-One Loop
        for (let i = 0; i < numberArray.length; i++) {
            const currentNumber = numberArray[i];
            
            // Update UI to show progress
            btn.innerText = `Sending ${i + 1} of ${numberArray.length}...`;
            showAlert('resSend', 'info', `Processing number: ${currentNumber}...`);
            
            // Set the specific number for this loop iteration
            baseFormData.set('to', currentNumber);

            try {
                const res = await fetch('https://api.sms.net.bd/sendsms', { method: 'POST', body: baseFormData });
                const data = await res.json();
                
                if (data.error === 0) {
                    successCount++;
                } else {
                    failCount++;
                    lastError = data.msg || `Error ${data.error}`;
                }
            } catch (err) {
                failCount++;
                lastError = getErrorMessage(err);
            }

            // Small delay (200ms) to prevent server rate-limiting
            await new Promise(resolve => setTimeout(resolve, 200));
        }

        // Final Result Output
        if (failCount === 0) {
            showAlert('resSend', 'success', `✅ Success! Sent to all ${successCount} number(s).`);
        } else if (successCount === 0) {
            showAlert('resSend', 'error', `❌ Failed to send. ${failCount} failed. Last error: ${lastError}`);
        } else {
            showAlert('resSend', 'error', `⚠️ Partial Success. Sent: ${successCount}, Failed: ${failCount}. Last error: ${lastError}`);
        }

        btn.disabled = false; 
        btn.innerText = "Send Message";
    }

    // 2. Handle Balance
    async function handleBalance() {
        const key = getApiKey(); if(!key) return;
        
        const btn = document.getElementById('btnBalance');
        btn.disabled = true; btn.innerText = "Checking...";
        showAlert('resBalance', '', '');

        try {
            const res = await fetch(`https://api.sms.net.bd/user/balance/?api_key=${encodeURIComponent(key)}`);
            const data = await res.json();
            showAlert('resBalance', data.error === 0 ? 'success' : 'error', data);
        } catch (err) {
            showAlert('resBalance', 'error', getErrorMessage(err));
        } finally {
            btn.disabled = false; btn.innerText = "Check Balance";
        }
    }

    // 3. Handle Report
    async function handleReport() {
        const key = getApiKey(); if(!key) return;
        const reqId = document.getElementById('reqId').value.trim();
        if(!reqId) return alert("Enter Request ID!");
        
        const btn = document.getElementById('btnReport');
        btn.disabled = true; btn.innerText = "Checking...";
        showAlert('resReport', '', '');

        try {
            const res = await fetch(`https://api.sms.net.bd/report/request/${encodeURIComponent(reqId)}/?api_key=${encodeURIComponent(key)}`);
            const data = await res.json();
            showAlert('resReport', data.error === 0 ? 'success' : 'error', data);
        } catch (err) {
            showAlert('resReport', 'error', getErrorMessage(err));
        } finally {
            btn.disabled = false; btn.innerText = "Check Status";
        }
    }
</script>
</body>
</html>
