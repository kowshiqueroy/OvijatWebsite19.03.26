<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Update</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080810;
    color: #e0e0f0;
    font-family: 'Courier New', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
  }

  .corner { position: fixed; width: 56px; height: 56px; opacity: 0.25; }
  .corner-tl { top: 18px; left: 18px; border-top: 1px solid #6366f1; border-left: 1px solid #6366f1; }
  .corner-tr { top: 18px; right: 18px; border-top: 1px solid #6366f1; border-right: 1px solid #6366f1; }
  .corner-bl { bottom: 18px; left: 18px; border-bottom: 1px solid #6366f1; border-left: 1px solid #6366f1; }
  .corner-br { bottom: 18px; right: 18px; border-bottom: 1px solid #6366f1; border-right: 1px solid #6366f1; }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 660px;
    padding: 2rem;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 2.8rem;
  }
  .logo {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1.5px solid #6366f1;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .logo::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background: rgba(99,102,241,0.18);
  }
  .logo-dot { width: 12px; height: 12px; border-radius: 50%; background: #6366f1; }
  .htext h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.1em; color: #e0e0f0; }
  .htext p { font-size: 10px; color: #44445a; letter-spacing: 0.1em; margin-top: 3px; }
  .badge {
    margin-left: auto;
    font-size: 10px;
    color: #6366f1;
    border: 1px solid rgba(99,102,241,0.3);
    padding: 3px 12px;
    border-radius: 20px;
    letter-spacing: 0.06em;
  }

  /* BIG PERCENT */
  .big-pct {
    font-size: 88px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.02em;
    color: #e0e0f0;
    margin-bottom: 4px;
    transition: color 0.4s;
  }
  .big-pct .sym { font-size: 36px; color: #3a3a55; }

  .stage-lbl {
    font-size: 11px;
    color: #6366f1;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 1.4rem;
    min-height: 16px;
  }

  /* MAIN BAR */
  .main-track {
    height: 3px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    margin-bottom: 6px;
    overflow: hidden;
  }
  .main-fill {
    height: 100%;
    background: #6366f1;
    border-radius: 2px;
    width: 0%;
    transition: width 0.35s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  .main-fill::after {
    content: '';
    position: absolute; right: 0; top: 0; bottom: 0;
    width: 50px;
    background: linear-gradient(90deg, transparent, rgba(180,180,255,0.55));
  }
  .bar-meta {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #33334a;
    margin-bottom: 2rem;
    letter-spacing: 0.06em;
  }

  /* STAGE PILLS */
  .stage-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }
  .pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.05);
    background: rgba(255,255,255,0.02);
    font-size: 10px;
    color: #44445a;
    letter-spacing: 0.05em;
    transition: all 0.3s;
  }
  .pill.done {
    border-color: rgba(34,197,94,0.3);
    background: rgba(34,197,94,0.06);
    color: #22c55e;
  }
  .pill.active {
    border-color: rgba(99,102,241,0.4);
    background: rgba(99,102,241,0.08);
    color: #a5b4fc;
  }
  .pill-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #2a2a3e;
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .pill.done .pill-dot { background: #22c55e; }
  .pill.active .pill-dot { background: #6366f1; animation: pdot 1s infinite; }
  @keyframes pdot { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* SUB BARS */
  .sub-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 24px;
    margin-bottom: 1.6rem;
  }
  .sub-row {}
  .sub-header {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: #33334a;
    letter-spacing: 0.07em;
    margin-bottom: 5px;
  }
  .sub-track {
    height: 2px;
    background: rgba(255,255,255,0.04);
    border-radius: 1px;
    overflow: hidden;
  }
  .sub-fill {
    height: 100%;
    border-radius: 1px;
    transition: width 0.5s ease;
  }

  /* LOG */
  .log {
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 6px;
    padding: 10px 14px;
    height: 68px;
    overflow: hidden;
    margin-bottom: 1.2rem;
  }
  .log-line {
    font-size: 10px;
    line-height: 1.75;
    color: #2e2e42;
    letter-spacing: 0.03em;
    transition: color 0.4s;
  }
  .log-line.fresh { color: #55556a; }

  /* BOTTOM */
  .bottom {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: #25253a;
    letter-spacing: 0.07em;
  }
  .blink { animation: blink 1.1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }

  /* STAGE TRANSITION FLASH */
  .wrap.flash .big-pct { color: #a5b4fc; }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="wrap" id="wrap">
  <div class="header">
    <div class="logo"><div class="logo-dot"></div></div>
    <div class="htext">
      <h1>SYSTEM UPDATE</h1>
      <p>DO NOT POWER OFF YOUR DEVICE</p>
    </div>
    <div class="badge" id="ver-badge">STAGE 1 OF 2</div>
  </div>

  <div class="big-pct" id="big-pct">0<span class="sym">%</span></div>
  <div class="stage-lbl" id="stage-lbl">Initializing...</div>

  <div class="main-track"><div class="main-fill" id="main-fill"></div></div>
  <div class="bar-meta">
    <span id="speed-lbl">0.0 MB/s</span>
    <span id="eta-lbl">Calculating ETA...</span>
  </div>

  <div class="stage-pills" id="pills"></div>

  <div class="sub-grid" id="sub-grid"></div>

  <div class="log" id="log"></div>

  <div class="bottom">
    <span>SYS-UPD-LOOP</span>
    <span id="clock">00:00:00</span>
    <span>KERNEL 5.15.0 <span class="blink">_</span></span>
  </div>
</div>

<script>
const CYCLE = [
  {
    label: "PHASE 1 — CORE UPDATE",
    badge: "STAGE 1 OF 2",
    color: "#6366f1",
    glow: "#a5b4fc",
    steps: ["VERIFY PACKAGES","DOWNLOAD CORE","PATCH KERNEL","UPDATE DRIVERS","REBUILD INDEX","FLUSH CACHE","APPLY CONFIG","FINALIZE"],
    logs: [
      "→ Resolving package tree...",
      "→ Checksum OK: core-runtime-5.0.0.pkg",
      "→ Fetching delta patch (142 MB)...",
      "→ Unpacking boot/vmlinuz-5.0.0...",
      "→ Applying hotfix #0041 (CVE-2025-4471)",
      "→ Rewriting /etc/fstab entries...",
      "→ Rebuilding initramfs image...",
      "→ Updating GRUB configuration...",
      "→ Flushing write-back cache (4.2 GB)...",
      "→ Syncing block devices [sda, nvme0n1]...",
      "→ Verifying EFI partition integrity...",
      "→ Compiling kernel modules [84/84]...",
    ]
  },
  {
    label: "PHASE 2 — SYSTEM RESTORE",
    badge: "STAGE 2 OF 2",
    color: "#14b8a6",
    glow: "#5eead4",
    steps: ["LOAD SNAPSHOT","RESTORE FILES","VERIFY HASHES","SYNC VOLUMES","MIGRATE SCHEMA","RELINK LIBS","TEST SERVICES","COMPLETE"],
    logs: [
      "→ Loading system snapshot v5.0.0...",
      "→ Restoring /usr/lib tree (3.1 GB)...",
      "→ Verifying SHA256 hashes [1024/1024]...",
      "→ Mounting /dev/nvme0n1p3...",
      "→ Migrating config schema v4→v5...",
      "→ Relinking shared libraries...",
      "→ Testing systemd service units...",
      "→ Running smoke tests [pass]...",
      "→ Cleaning up temp artifacts...",
      "→ Writing restore manifest...",
      "→ Sealing update transaction...",
      "→ System ready for reboot...",
    ]
  }
];

const SUB_BARS = [
  { label: "DISK I/O", color: "#6366f1" },
  { label: "NETWORK",  color: "#22c55e" },
  { label: "MEMORY",   color: "#f59e0b" },
  { label: "CPU LOAD", color: "#ef4444" }
];

let cycleIdx = 0;
let pct = 0;
let currentStep = -1;
let logIdx = 0;
let startTime = Date.now();
let logLines = [];

const pillsEl   = document.getElementById("pills");
const subGrid   = document.getElementById("sub-grid");
const logEl     = document.getElementById("log");
const wrap      = document.getElementById("wrap");

function buildPills(cycle) {
  pillsEl.innerHTML = "";
  cycle.steps.forEach((s, i) => {
    const p = document.createElement("div");
    p.className = "pill";
    p.id = "pill-" + i;
    p.innerHTML = `<div class="pill-dot" id="pdot-${i}"></div><span>${s}</span>`;
    pillsEl.appendChild(p);
  });
}

function buildSubBars() {
  subGrid.innerHTML = "";
  SUB_BARS.forEach((b, i) => {
    const row = document.createElement("div");
    row.className = "sub-row";
    row.innerHTML = `
      <div class="sub-header"><span>${b.label}</span><span id="sbpct-${i}">0%</span></div>
      <div class="sub-track"><div class="sub-fill" id="sb-${i}" style="width:0%;background:${b.color}"></div></div>`;
    subGrid.appendChild(row);
  });
}

function addLog(txt) {
  const lines = logEl.querySelectorAll(".log-line");
  lines.forEach(l => l.classList.remove("fresh"));
  if (lines.length >= 4) lines[0].remove();
  const d = document.createElement("div");
  d.className = "log-line fresh";
  d.textContent = txt;
  logEl.appendChild(d);
}

function updateSubBars(cycle) {
  SUB_BARS.forEach((b, i) => {
    const v = Math.min(100, Math.max(0, Math.round(pct + (Math.random() * 24 - 12) + i * 2 - 4)));
    document.getElementById(`sb-${i}`).style.width = v + "%";
    document.getElementById(`sbpct-${i}`).textContent = v + "%";
  });
}

function setStep(cycle, idx) {
  if (idx === currentStep) return;
  if (currentStep >= 0 && currentStep < cycle.steps.length) {
    document.getElementById("pill-" + currentStep).className = "pill done";
  }
  currentStep = idx;
  if (currentStep >= 0 && currentStep < cycle.steps.length) {
    document.getElementById("pill-" + currentStep).className = "pill active";
  }
}

function startCycle(idx) {
  cycleIdx = idx;
  pct = 0;
  currentStep = -1;
  logIdx = 0;
  logLines = CYCLE[idx].logs;
  logEl.innerHTML = "";
  startTime = Date.now();

  const cycle = CYCLE[idx];
  document.getElementById("ver-badge").textContent = cycle.badge;
  document.getElementById("stage-lbl").textContent = cycle.label;
  document.getElementById("big-pct").childNodes[0].textContent = "0";
  document.getElementById("main-fill").style.background = cycle.color;
  document.getElementById("main-fill").style.width = "0%";
  document.getElementById("speed-lbl").textContent = "0.0 MB/s";
  document.getElementById("eta-lbl").textContent = "Calculating ETA...";

  buildPills(cycle);
  buildSubBars();
  tick();
}

function tick() {
  const cycle = CYCLE[cycleIdx];
  const stepThresholds = [4, 16, 28, 42, 55, 67, 81, 93];

  const inc = pct < 30 ? Math.random()*1.3+0.4
            : pct < 70 ? Math.random()*1.0+0.25
            :             Math.random()*0.55+0.12;

  pct = Math.min(100, pct + inc);
  const r = Math.round(pct);

  document.getElementById("big-pct").childNodes[0].textContent = r;
  document.getElementById("main-fill").style.width = pct + "%";

  const speed = (Math.random() * 18 + 2).toFixed(1);
  const eta = Math.max(0, Math.round((100 - pct) / (inc * 2.8)));
  document.getElementById("speed-lbl").textContent = speed + " MB/s";
  document.getElementById("eta-lbl").textContent = pct >= 99 ? "Almost done..." : "ETA " + eta + "s";

  for (let i = stepThresholds.length - 1; i >= 0; i--) {
    if (pct >= stepThresholds[i]) { setStep(cycle, i); break; }
  }

  updateSubBars(cycle);

  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  if (Math.random() < 0.10 && logIdx < logLines.length) addLog(logLines[logIdx++]);

  const h = String(Math.floor(elapsed/3600)).padStart(2,"0");
  const m = String(Math.floor((elapsed%3600)/60)).padStart(2,"0");
  const s = String(elapsed%60).padStart(2,"0");
  document.getElementById("clock").textContent = h+":"+m+":"+s;

  if (pct >= 100) {
    setStep(cycle, cycle.steps.length - 1);
    document.getElementById("pill-" + (cycle.steps.length-1)).className = "pill done";
    document.getElementById("eta-lbl").textContent = "Complete";
    addLog("→ Stage complete. Preparing next phase...");

    setTimeout(() => {
      wrap.classList.add("flash");
      setTimeout(() => {
        wrap.classList.remove("flash");
        startCycle((cycleIdx + 1) % CYCLE.length);
      }, 600);
    }, 1400);
    return;
  }

  setTimeout(tick, 75 + Math.random() * 110);
}

buildSubBars();
startCycle(0);
</script>
</body>
</html>
