<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Layout</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #0f0f1a; color: #fff; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 70px; background: #1a1a2e; border-right: 1px solid #333; }
        .main-content { flex: 1; display: flex; flex-direction: column; margin-left: 70px; }
        .top-bar { height: 64px; background: #1a1a2e; border-bottom: 1px solid #333; }
        .content-area { flex: 1; padding: 24px; }
        .three-col-layout { 
            display: grid; 
            grid-template-columns: 320px 360px 1fr; 
            gap: 20px; 
            height: calc(100vh - 64px - 48px);
        }
        .col-search, .col-contact, .col-details { 
            background: rgba(30, 30, 50, 0.9); 
            border: 1px solid #333; 
            border-radius: 12px; 
            overflow: hidden; 
        }
        .col-header { padding: 16px 20px; background: #1e1e32; border-bottom: 1px solid #333; }
        .result-list { flex: 1; overflow-y: auto; padding: 8px; }
        .result-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; }
        .result-item:hover { background: #252540; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; color: #666; }
        .empty-state i { font-size: 3rem; margin-bottom: 16px; }
        .hidden { display: none; }
        .test-btn { padding: 10px 20px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div style="padding:20px;text-align:center;">
                <i class="fas fa-headset" style="font-size:1.5rem;color:#6366f1;"></i>
            </div>
            <nav style="padding:16px 12px;">
                <a href="#" style="display:flex;align-items:center;gap:12px;padding:12px;color:#94a3b8;text-decoration:none;border-radius:8px;">
                    <i class="fas fa-chart-pie"></i>
                </a>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="top-bar">
                <div style="padding:0 24px;display:flex;align-items:center;height:100%;">
                    <span>Ovijat Call Center</span>
                </div>
            </header>
            
            <div class="content-area">
                <div class="three-col-layout">
                    <div class="col-search">
                        <div class="col-header">
                            <h3><i class="fas fa-search"></i> Search</h3>
                            <button class="test-btn" onclick="alert('Fetch PBX clicked')">Fetch PBX</button>
                        </div>
                        <div style="padding:16px;">
                            <input type="text" placeholder="Search..." style="width:100%;padding:10px;background:#1e1e32;border:1px solid #333;border-radius:8px;color:white;">
                        </div>
                        <div class="result-tabs" style="display:flex;gap:4px;padding:8px;border-bottom:1px solid #333;">
                            <button class="tab-btn active" style="flex:1;padding:10px;background:#6366f1;color:white;border:none;border-radius:6px;cursor:pointer;">Contacts</button>
                            <button class="tab-btn" style="flex:1;padding:10px;background:transparent;color:#94a3b8;border:1px solid #333;border-radius:6px;cursor:pointer;">Calls</button>
                        </div>
                        <div class="result-list">
                            <div class="empty-state">
                                <i class="fas fa-search"></i>
                                <p>Search to see results</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-contact">
                        <div class="col-header">
                            <h3><i class="fas fa-user"></i> Contact</h3>
                        </div>
                        <div class="result-list">
                            <div class="empty-state">
                                <i class="fas fa-hand-pointer"></i>
                                <p>Select a contact</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-details">
                        <div class="col-header">
                            <h3><i class="fas fa-plus"></i> New Entry</h3>
                        </div>
                        <div class="result-list" style="padding:16px;">
                            <p style="color:#94a3b8;">This is column 3</p>
                            <button class="test-btn" onclick="alert('Button in column 3 works!')">Test Button</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        console.log('Test page loaded');
    </script>
</body>
</html>
